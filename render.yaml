# Render deployment configuration for MarroeCode backend API

services:
  - type: web
    name: marroecode-api
    runtime: python
    region: oregon        # choose: oregon | frankfurt | singapore | ohio
    plan: free            # upgrade to starter for always-on
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/practice/concepts

    envVars:
      # Copy your actual values from backend/.env into Render dashboard
      - key: SUPABASE_URL
        sync: false       # set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false       # set manually in Render dashboard
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: "utf-8"

    # Auto-deploy on every push to main branch
    autoDeploy: true
