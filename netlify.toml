# Netlify configuration for MarroeCode
# We serve the pre-built dist folder directly — no build step needed on Netlify

[build]
  # No build command — we commit the built dist directly
  publish = "frontend/dist"

# SPA fallback — all routes serve index.html (React Router handles them)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache static assets aggressively (immutable hash-named files)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
