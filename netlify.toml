# Netlify configuration for MarroeCode frontend SPA

[build]
  # Build command runs from the frontend directory
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  # Set your Render backend URL here (update after deploying backend)
  VITE_API_BASEURL = "https://marroecode-api.onrender.com/api"

# SPA fallback — all routes serve index.html (React Router handles them)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
